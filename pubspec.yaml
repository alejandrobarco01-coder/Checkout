name: checkout
description: "CheckOut - Checklists inteligentes para cada tipo de salida"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación declarativa
  go_router: ^14.2.0

  # Gestión de estado global
  provider: ^6.1.2

  # JWT en almacenamiento seguro
  flutter_secure_storage: ^9.2.2

  # Preferencias del usuario (tema, ciudad, último tipo de salida)
  shared_preferences: ^2.3.2

  # Base de datos local SQLite
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP para consumir OpenWeatherMap
  http: ^1.2.2

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Animaciones fluidas
  flutter_animate: ^4.5.0

  # Animación de confeti al completar listas
  confetti: ^0.7.0

  # Menú SpeedDial para el FAB
  flutter_speed_dial: ^7.0.0

  # Calendario visual premium
  table_calendar: ^3.1.2

  # Google Places y Maps
  flutter_google_places_sdk: ^0.4.3
  google_maps_flutter: ^2.9.0

  # IDs únicos para viajes
  uuid: ^4.4.0

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Mapa OpenStreetMap (pantalla mapa legado)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Tipografía premium y diseño moderno
  google_fonts: ^6.0.0
  
  # Iconos y ilustraciones SVG
  flutter_svg: ^2.0.0
  
  # Animaciones Lottie profesionales
  lottie: ^3.0.0
  
  # Indicadores suaves de páginas
  smooth_page_indicator: ^1.1.0
  
  # Efecto de carga shimmer
  shimmer: ^3.0.0
  
  # Notificaciones locales
  flutter_local_notifications: ^12.0.3

  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
