name: checkout
description: "CheckOut - Checklists inteligentes para cada tipo de salida"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navegación declarativa
  go_router: ^14.2.0

  # Gestión de estado global
  provider: ^6.1.2

  # JWT en almacenamiento seguro
  flutter_secure_storage: ^9.2.2

  # Preferencias del usuario (tema, ciudad, último tipo de salida)
  shared_preferences: ^2.3.2

  # Base de datos local SQLite
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP para consumir OpenWeatherMap
  http: ^1.2.2

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Animaciones fluidas
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
